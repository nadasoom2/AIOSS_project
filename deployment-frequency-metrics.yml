# Deployment Frequency 메트릭 설정

deployment_frequency:
  # 배포 빈도 목표
  targets:
    daily: 1.0         # 목표: 1회/일 (Elite 등급)
    weekly: 7.0        # 1주일에 7회 = 1회/일
    minimum: 0.5       # 최소 목표: 0.5회/일 (주 3.5회)
    warning: 0.33      # 경고: 0.33회/일 (주 2회 이하)
  
  # 배포 환경 추적
  environments:
    - name: "development"
      track: true
      alert: false
    - name: "staging"
      track: true
      alert: true
    - name: "production"
      track: true
      alert: true
  
  # 배포 소스
  sources:
    - github_actions
    - manual_deployment
    - ci_cd_pipeline
  
  # 분석 기간
  analysis_period:
    days: 30           # 30일 기준
    weeks: 4           # 또는 4주
    months: 1          # 또는 1개월

# Deployment Frequency 등급 기준 (DORA)
dora_levels:
  elite:
    description: "엘리트 성과"
    deployment_frequency: "On-demand (정상적으로 매일 여러 배포)"
    requirement: "≥ 1 deploy per day"
  
  high:
    description: "높은 성과"
    deployment_frequency: "주 1회~월 1회"
    requirement: "1 per week to 1 per month"
  
  medium:
    description: "중간 성과"
    deployment_frequency: "월 1회~월 6개월 1회"
    requirement: "1 per month to 1 per 6 months"
  
  low:
    description: "낮은 성과"
    deployment_frequency: "6개월 이상에 1회"
    requirement: "< 1 per 6 months"

# 릴리스 빈도
release_frequency:
  major:
    target: 4        # 연 4회 (분기별)
    alert_if_less: 2  # 연 2회 이하 경고
  
  minor:
    target: 12       # 연 12회 (월 1회)
    alert_if_less: 6
  
  patch:
    target: 52       # 연 52회 (주 1회)
    alert_if_less: 26

# 배포 메트릭 수집
metrics:
  - metric_name: "daily_deployment_count"
    description: "일일 배포 횟수"
    unit: "count"
    environment: "production"
  
  - metric_name: "weekly_deployment_count"
    description: "주간 배포 횟수"
    unit: "count"
    environment: "production"
  
  - metric_name: "deployment_success_rate"
    description: "배포 성공률"
    unit: "percentage"
    environment: "production"
    target: 95
  
  - metric_name: "days_with_deployments"
    description: "배포가 있었던 날 수"
    unit: "count"
  
  - metric_name: "time_between_deployments"
    description: "배포 간 평균 시간"
    unit: "hours"

# 알림 설정
notifications:
  enabled: true
  
  # 배포 빈도 감소 시 알림
  frequency_drop:
    enabled: true
    threshold_reduction: 30  # 30% 감소 시 알림
    consecutive_days: 3      # 3일 연속 시
  
  # 배포 실패 시 알림
  deployment_failure:
    enabled: true
    threshold: 2  # 2회 이상 연속 실패
  
  # 채널
  channels:
    - slack
    - email
    - github_issues

# 개선 목표
improvement_plan:
  current_phase: "Phase 1"
  phases:
    - phase: "Phase 1"
      goal: "주 1회 배포 달성"
      duration: "3개월"
      target_frequency: "0.14"  # 1/7
    
    - phase: "Phase 2"
      goal: "격일 배포 달성"
      duration: "6개월"
      target_frequency: "0.5"
    
    - phase: "Phase 3"
      goal: "일일 배포 달성"
      duration: "12개월"
      target_frequency: "1.0"

# 배포 자동화 체크리스트
automation_checklist:
  - name: "자동화된 테스트"
    status: "required"
    description: "모든 배포 전 자동 테스트 실행"
  
  - name: "자동화된 빌드"
    status: "required"
    description: "CI/CD 파이프라인에서 자동 빌드"
  
  - name: "자동화된 배포"
    status: "required"
    description: "프로덕션 배포 자동화"
  
  - name: "자동화된 롤백"
    status: "optional"
    description: "배포 실패 시 자동 롤백"
  
  - name: "모니터링 및 알림"
    status: "required"
    description: "배포 후 자동 상태 확인"

# 데이터 수집 스케줄
data_collection:
  frequency: "daily"
  time: "00:00 UTC"  # UTC 자정
  timezone: "UTC"
  retention_days: 365

# 대시보드 설정
dashboard:
  enabled: true
  update_frequency: "hourly"
  
  widgets:
    - type: "gauge"
      metric: "deployment_frequency"
      target: 1.0
    
    - type: "line_chart"
      metric: "daily_deployment_count"
      period: 30
    
    - type: "bar_chart"
      metric: "deployment_by_environment"
    
    - type: "table"
      metric: "recent_deployments"
      limit: 20
