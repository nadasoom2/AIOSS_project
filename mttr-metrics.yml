## 워크플로우 실행 일정

```yaml
schedule:
  - cron: '0 9 * * *'  # 매일 09:00 UTC (한국 시간 17:00)
```

### 실행 시점
- 매일 자동 실행
- 이슈 생성/종료 시 즉시 실행
- 수동으로도 실행 가능 (workflow_dispatch)

## 알림 및 리포트

### GitHub 자동 상호작용
- 이슈 종료 시 자동 댓글 추가
- Workflow summary에 리포트 표시
- Artifact로 메트릭 파일 저장 (30일)

### 외부 연계 (예정)
- Slack 알림
- 대시보드 API 연계
- 메일 리포트 발송

