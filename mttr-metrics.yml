# MTTR(평균 복구 시간) 메트릭 설정

## 메트릭 정의

### 주요 메트릭
- **MTTR (Mean Time To Recovery)**: 평균 복구 시간
- **평균값**: 모든 인시던트의 평균 복구 시간
- **중앙값**: 데이터의 중간값 (이상치에 덜 민감)
- **95 백분위**: 상위 5%의 느린 복구 사건
- **99 백분위**: 상위 1%의 극단적으로 느린 복구 사건

### 목표값 (SLA)

프로덕션 환경 기준:

| 심각도 | 목표 MTTR | P95 목표 | P99 목표 |
|--------|----------|---------|---------|
| Critical | 15분 | 30분 | 60분 |
| High | 30분 | 90분 | 180분 |
| Medium | 60분 | 180분 | 360분 |
| Low | 240분 | 480분 | 720분 |

## 메트릭 계산 방식

### 기본 계산
```
MTTR = (이슈 종료 시간 - 이슈 생성 시간)

예)
- 이슈 생성: 2024-03-30 10:00 UTC
- 이슈 종료: 2024-03-30 11:45 UTC
- MTTR: 105분 (= 1시간 45분)
```

### 심각도별 계산
```
각 인시던트의 라벨에서 심각도 추출:
- "critical" → Critical
- "critical-production" → Critical
- "high" → High
- "medium" → Medium (기본값)
- "low" → Low
```

### 날짜별 집계
```
일별 평균 MTTR = 해당 날짜에 종료된 인시던트들의 MTTR 평균
```

## 수집 범위

### 자동 수집 이슈
- 라벨: `incident`
- 상태: `closed`
- 기간: 설정된 날짜 범위 (기본 30일)

### 제외 대상
- `wontfix` 라벨
- `duplicate` 라벨
- `documentation` 라벨만 있는 이슈

## 리포트 출력 형식

### 종합 리포트
```
📊 MTTR(Mean Time To Recovery) 리포트
============================================================

📈 종합 통계
  총 인시던트: 5개
  평균 복구 시간: 120.5분 (2.0시간)
  중앙값: 95분
  최소: 15분
  최대: 280분
  95 백분위: 250분
  99 백분위: 275분

🎯 심각도별 MTTR
  [Critical]
    건수: 2개
    평균: 180분
    범위: 120 ~ 240분

📅 최근 인시던트 (상위 5개)
  1. #123 - 데이터베이스 연결 오류
     복구시간: 2.5시간 (Critical)
```

